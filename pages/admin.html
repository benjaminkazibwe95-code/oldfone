<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OldFone Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f5f0e8;color:#0e1a0f;min-height:100vh}
.top{background:#0e1a0f;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-size:1.15rem;font-weight:700;color:#fff}.logo b{color:#4a9955}
.albl{font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#4a9955;background:rgba(74,153,85,0.15);padding:3px 10px;border-radius:20px;border:1px solid rgba(74,153,85,0.3);margin-left:8px}
.main{max-width:920px;margin:0 auto;padding:24px 14px 60px}
.ptit{font-size:1.5rem;font-weight:700;letter-spacing:-0.3px;margin-bottom:4px}
.psub{font-size:0.82rem;color:#6b7c6e;margin-bottom:24px}

/* STATS */
.srow{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.sc{background:#fff;border:2px solid #d4cfc4;border-radius:14px;padding:16px;flex:1 1 140px}
.slbl{font-size:0.7rem;font-weight:700;color:#6b7c6e;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.sval{font-size:1.7rem;font-weight:700;font-family:monospace;color:#0e1a0f}
.sval.g{color:#2d6a35}

/* CARDS */
.card{background:#fff;border:2px solid #d4cfc4;border-radius:16px;padding:18px;margin-bottom:18px}
.chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ctit{font-size:0.97rem;font-weight:700}
.rbtn{background:transparent;border:2px solid #d4cfc4;color:#6b7c6e;font-family:Arial,Helvetica,sans-serif;font-size:0.75rem;padding:5px 11px;border-radius:7px;cursor:pointer}

/* PAYMENT ROW */
.prow{border:2px solid #d4cfc4;border-radius:12px;padding:13px 14px;margin-bottom:10px}
.pemail{font-size:0.85rem;font-weight:700}
.pdet{font-size:0.76rem;color:#6b7c6e;margin-top:3px;line-height:1.6}
.pref{font-family:monospace;font-size:0.71rem;color:#c8923a;background:#fdf3e3;border:1px solid #e8c47a;padding:2px 8px;border-radius:5px;display:inline-block;margin-top:4px}
.pamt{font-family:monospace;font-size:1rem;font-weight:700;color:#2d6a35;float:right;margin-top:2px}
.pacts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ok-btn{background:#2d6a35;color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:0.78rem;font-weight:700;padding:7px 13px;border-radius:7px;border:none;cursor:pointer}
.rej-btn{background:transparent;color:#c0392b;font-family:Arial,Helvetica,sans-serif;font-size:0.78rem;font-weight:600;padding:7px 13px;border-radius:7px;border:2px solid #f5c6c2;cursor:pointer}
.empty-s{text-align:center;padding:32px;color:#6b7c6e;font-size:0.83rem}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{text-align:left;padding:7px 10px;color:#6b7c6e;font-size:0.7rem;text-transform:uppercase;border-bottom:2px solid #d4cfc4}
td{padding:9px 10px;border-bottom:1px solid #d4cfc4}
tr:hover td{background:#f5f0e8}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.67rem;font-weight:700}
.ba{background:#e8f2e9;color:#2d6a35}
.bp{background:#fdf3e3;color:#c8923a}
.bs{background:#fdecea;color:#c0392b}
.bf{background:#f0f0f0;color:#777}
.bpro{background:#e8f2e9;color:#2d6a35;border:1px solid #b8d8bb}

/* TOAST */
.toast{position:fixed;bottom:20px;right:14px;background:#0e1a0f;color:#fff;padding:11px 16px;border-radius:10px;font-size:0.82rem;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:100;max-width:280px}
.toast.on{opacity:1}
</style>
<script>
// Read token from URL
var TOKEN = (function() {
  var m = window.location.search.match(/token=([^&]+)/);
  return m ? m[1] : '';
})();
if (TOKEN) {
  sessionStorage.setItem('of_admin_token', TOKEN);
  history.replaceState(null, '', '/admin');
} else {
  TOKEN = sessionStorage.getItem('of_admin_token') || '';
}
if (!TOKEN) { window.location.href = '/'; }

function api(method, url, data, ok, fail) {
  var r = new XMLHttpRequest();
  r.open(method, url, true);
  r.setRequestHeader('x-auth-token', TOKEN);
  r.timeout = 12000;
  if (data) r.setRequestHeader('Content-Type', 'application/json');
  r.onload = function() {
    if (r.status >= 200 && r.status < 300) {
      try { ok(JSON.parse(r.responseText)); }
      catch(e) { if (fail) fail('Bad response'); }
    } else if (r.status === 401 || r.status === 403) {
      window.location.href = '/';
    } else { if (fail) fail('Error ' + r.status); }
  };
  r.onerror = function() { if (fail) fail('Network error'); };
  r.ontimeout = function() { if (fail) fail('Timed out'); };
  r.send(data ? JSON.stringify(data) : null);
}
function get(url, ok) { api('GET', url, null, ok, function(e){ console.error(e); }); }
function post(url, data, ok) { api('POST', url, data, ok, function(e){ toast('Error: ' + e); }); }

function toast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg; el.className = 'toast on';
  setTimeout(function() { el.className = 'toast'; }, 3500);
}

function loadStats() {
  get('/api/admin/stats', function(d) {
    if (!d.ok) return;
    var s = d.stats;
    document.getElementById('s-u').textContent = s.totalUsers;
    document.getElementById('s-a').textContent = s.activeUsers;
    document.getElementById('s-p').textContent = s.confirmedPayments;
    document.getElementById('s-r').textContent = Number(s.revenueUGX).toLocaleString() + ' UGX';
  });
}

function loadPayments() {
  get('/api/admin/payments', function(d) {
    var list = document.getElementById('pay-list');
    var cnt = document.getElementById('p-count');
    if (!d.ok || !d.payments.length) {
      cnt.textContent = '';
      list.innerHTML = '<div class="empty-s">✅ No pending payments — all clear!</div>';
      return;
    }
    cnt.textContent = '(' + d.payments.length + ')';
    var html = '';
    for (var i = 0; i < d.payments.length; i++) {
      var p = d.payments[i];
      var date = new Date(p.created_at).toLocaleString('en-UG');
      html += '<div class="prow" id="pr-' + p.id + '">' +
        '<span class="pamt">' + Number(p.amount).toLocaleString() + ' UGX</span>' +
        '<div class="pemail">' + p.email + '</div>' +
        '<div class="pdet">' + p.network.toUpperCase() + ' &middot; ' + p.momo_number + ' &middot; ' + (p.momo_name||'—') + '<br>' +
        'Plan: <b>' + p.plan + '</b> &middot; ' + date + '</div>' +
        '<div class="pref">REF: ' + (p.ref || 'NOT PROVIDED') + '</div>' +
        '<div class="pacts">' +
        '<button class="ok-btn" onclick="confirmPay(\'' + p.id + '\',\'' + p.user_id + '\',\'' + p.plan + '\')">✓ Confirm & Activate</button>' +
        '<button class="rej-btn" onclick="rejectPay(\'' + p.id + '\')">✗ Reject</button>' +
        '</div></div>';
    }
    list.innerHTML = html;
  });
}

function confirmPay(pid, uid, plan) {
  if (!confirm('Confirm this payment and activate the user?')) return;
  post('/api/admin/confirm', { payment_id: pid, user_id: uid, plan: plan }, function(d) {
    if (d.ok) {
      var el = document.getElementById('pr-' + pid); if (el) el.parentNode.removeChild(el);
      toast('✅ Payment confirmed! User activated.');
      loadStats(); loadUsers();
    } else { toast('Error: ' + (d.error||'failed')); }
  });
}

function rejectPay(pid) {
  if (!confirm('Reject this payment?')) return;
  post('/api/admin/reject', { payment_id: pid }, function(d) {
    if (d.ok) {
      var el = document.getElementById('pr-' + pid); if (el) el.parentNode.removeChild(el);
      toast('Payment rejected.');
    }
  });
}

function loadUsers() {
  get('/api/admin/users', function(d) {
    var area = document.getElementById('users-tbl');
    if (!d.ok || !d.users.length) { area.innerHTML = '<div class="empty-s">No users yet</div>'; return; }
    var html = '<table><thead><tr><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th></tr></thead><tbody>';
    for (var i = 0; i < d.users.length; i++) {
      var u = d.users[i];
      var sc = u.status === 'active' ? 'ba' : u.status === 'pending' ? 'bp' : 'bs';
      var pc = (u.plan === 'pro' || u.plan === 'pro3') ? 'bpro' : 'bf';
      var dt = new Date(u.created_at).toLocaleDateString('en-UG');
      html += '<tr><td>' + u.email + '</td>' +
        '<td><span class="badge ' + pc + '">' + u.plan.toUpperCase() + '</span></td>' +
        '<td><span class="badge ' + sc + '">' + u.status + '</span></td>' +
        '<td style="color:#6b7c6e;font-size:0.74rem">' + dt + '</td></tr>';
    }
    html += '</tbody></table>';
    area.innerHTML = html;
  });
}

function init() {
  var lt = document.getElementById('logout-token');
  if (lt) lt.value = TOKEN;
  loadStats(); loadPayments(); loadUsers();
}
setInterval(function() { loadPayments(); loadStats(); }, 60000);
</script>
</head>
<body onload="init()">

<div class="top">
  <div><span class="logo">Old<b>Fone</b></span><span class="albl">ADMIN</span></div>
  <form method="POST" action="/form/logout" style="margin:0" id="logout-form">
    <input type="hidden" name="token" id="logout-token" value="">
    <button type="submit" style="background:transparent;border:none;color:#6b7c6e;font-family:Arial,Helvetica,sans-serif;font-size:0.8rem;cursor:pointer">Sign Out</button>
  </form>
</div>

<div class="main">
  <div class="ptit">Admin Dashboard</div>
  <div class="psub">Confirm payments. Manage users. Track your revenue.</div>

  <div class="srow">
    <div class="sc"><div class="slbl">Total Users</div><div class="sval" id="s-u">—</div></div>
    <div class="sc"><div class="slbl">Active Users</div><div class="sval g" id="s-a">—</div></div>
    <div class="sc"><div class="slbl">Payments Done</div><div class="sval" id="s-p">—</div></div>
    <div class="sc"><div class="slbl">Total Revenue</div><div class="sval g" id="s-r">—</div></div>
  </div>

  <div class="card">
    <div class="chead">
      <span class="ctit">⏳ Pending Payments <span id="p-count" style="font-size:0.78rem;font-weight:400;color:#6b7c6e"></span></span>
      <button class="rbtn" onclick="loadPayments()">Refresh</button>
    </div>
    <div id="pay-list"><div class="empty-s">Loading...</div></div>
  </div>

  <div class="card">
    <div class="chead">
      <span class="ctit">👥 All Users</span>
      <button class="rbtn" onclick="loadUsers()">Refresh</button>
    </div>
    <div id="users-tbl"><div class="empty-s">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
